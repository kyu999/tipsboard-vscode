name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test, build, and package VSIX
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webview/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix webview

      - name: Test
        run: npm test

      - name: Package VSIX
        run: npm run package

      - name: Read extension version
        id: version
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: tipsboard-vscode-${{ steps.version.outputs.version }}
          path: tipsboard-vscode-*.vsix
          if-no-files-found: error
          retention-days: 90
