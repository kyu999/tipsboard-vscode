name: Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to upload assets to
        required: true
        type: string

concurrency:
  group: release-assets-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  package-vsix:
    name: Package VSIX
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webview/package-lock.json

      - name: Install dependencies
        env:
          ONNXRUNTIME_NODE_INSTALL: skip
        run: |
          npm ci
          npm ci --prefix webview

      - name: Read extension version
        id: version
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Package VSIX
        run: |
          npm run package -- --out tipsboard-vscode-${{ steps.version.outputs.version }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: tipsboard-vscode-${{ steps.version.outputs.version }}
          path: tipsboard-vscode-${{ steps.version.outputs.version }}.vsix
          if-no-files-found: error

  semantic-runtime:
    name: Build semantic runtime (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win32-x64
          - os: macos-14
            target: darwin-arm64
          - os: ubuntu-latest
            target: linux-x64
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          ONNXRUNTIME_NODE_INSTALL: skip
        run: npm ci

      - name: Build semantic runtime pack
        run: |
          npm run prepare:semantic-pack -- --target ${{ matrix.target }} --out tipsboard-semantic-runtime-${{ matrix.target }}.zip

      - name: Upload semantic runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: tipsboard-semantic-runtime-${{ matrix.target }}
          path: tipsboard-semantic-runtime-${{ matrix.target }}.zip
          if-no-files-found: error

  upload-release-assets:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: [package-vsix, semantic-runtime]
    permissions:
      contents: write
    defaults:
      run:
        shell: bash

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          gh release upload "$RELEASE_TAG" release-assets/* --clobber
